<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD de Produtos</title>
  <link rel="stylesheet" href="css/style.css">
  
</head>
<body>
  <div class="container">
    <h1>Gerenciamento de Produtos</h1>

    <!-- Criar Produto -->
    <h2>Criar Produto</h2>
    <form id="createForm">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required>

      <label for="preco">Preço:</label>
      <input type="number" id="preco" name="preco" step="0.01" required>

      <button type="submit">Criar Produto</button>
    </form>

    <!-- Atualizar Produto -->
    <h2>Atualizar Produto</h2>
    <form id="updateForm">
      <label for="updateId">ID do Produto:</label>
      <input type="number" id="updateId" name="updateId" required>

      <label for="updateNome">Nome:</label>
      <input type="text" id="updateNome" name="updateNome">

      <label for="updatePreco">Preço:</label>
      <input type="number" id="updatePreco" name="updatePreco" step="0.01">

      <button type="submit">Atualizar Produto</button>
    </form>

    <!-- Lista de Produtos -->
    <h2>Lista de Produtos</h2>
    <button id="fetchProductsBtn">Carregar Produtos</button>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Preço</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="produtosTableBody">
      </tbody>
    </table>
</div>
  <script>


    // criar produtos 
    document.getElementById('createForm')
    .addEventListener('submit', async(e)=>{
     e.preventDefault();

    const nome = document.getElementById('nome').value;
    const preco = document.getElementById('preco').value;
    
      try {
        const response = await fetch('/api/produtos',{
          method: "POST",
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({nome, preco})
        });

        if (response.ok){
          alert('Produto criado com sucesso!');
          document.getElementById('createForm').reset();
          loadProucts();

        } else {
          alert('Erro ao criar produto.');
        }
      } catch (error) {
        alert('Erro de comunicação com o servidor.');
        
        
        
      }
    



     

    })
    

    document.getElementById('fetchProductsBtn')
    .addEventListener('click', loadProucts);

    async function loadProucts(){
      
      const response = await fetch('api/produtos');
      const produtos = await response.json();
      const tbody = document.getElementById('produtosTableBody');
      tbody.innerHTML = "";
      produtos.forEach( produto => {     
        const row = document.createElement('tr');
        row.innerHTML = `  
        <td>${produto.id}</td>
        <td>${produto.nome}</td>
        <td>${produto.preco}</td>
        
        <td></td>
        `;
        tbody.appendChild(row)
      });



    }

















    

    // Enviar requisição para consulta produto  


    // Enviar requisição para atualizar produto 



    // Deletar 

  </script>
</body>
</html>
